                        <div style={{ fontWeight: 500, fontSize: 14 }}>{x.name} <span style={{ color: "#8FA88A", fontWeight: 400 }}>· {x.qtyLabel}</span></div>
                        <div style={{ fontSize: 12, color: "#5C6B5E" }}>{x.p}g P · {x.c}g C · {x.f}g F · {x.fb}g fiber</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontWeight: 600, fontSize: 14 }}>{x.cal}</span>
                        <button onClick={() => { setCopyMenuFor(copyMenuFor === x.id ? null : x.id); setCopyQty(1); }} title="Copy to another meal" style={{ ...S.btn, background: "transparent", color: "#2C5E3F", padding: "4px 6px", fontSize: 15 }}>⧉</button>
                        <button onClick={() => removeFood(x.id)} title="Remove" style={{ ...S.btn, background: "transparent", color: "#C25E3A", padding: "4px 6px", fontSize: 16 }}>×</button>
                      </div>
                    </div>
                    {copyMenuFor === x.id && (
                      <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap", alignItems: "center", background: "#F4F7F0", borderRadius: 10, padding: "8px 10px" }}>
                        <span style={{ fontSize: 12, color: "#5C6B5E", fontWeight: 600 }}>×</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <button onClick={() => setCopyQty((q) => Math.max(r1(q - 0.5), 0.5))} style={{ ...S.btn, background: "#E3E9DE", padding: "4px 10px" }}>−</button>
                          <span style={{ minWidth: 28, textAlign: "center", fontWeight: 700, fontSize: 14 }}>{copyQty}</span>
                          <button onClick={() => setCopyQty((q) => r1(q + 0.5))} style={{ ...S.btn, background: "#E3E9DE", padding: "4px 10px" }}>+</button>
                        </div>
                        <span style={{ fontSize: 12, color: "#5C6B5E", fontWeight: 600, marginLeft: 4 }}>→ copy to:</span>
                        {MEALS.filter((mm) => mm.id !== x.meal).map((mm) => (
                          <button key={mm.id} onClick={() => copyToMeal(x, mm.id, copyQty)} style={S.chip(false)}>{mm.label}</button>
                        ))}
                        <button onClick={() => { setCopyMenuFor(null); setCopyQty(1); }} style={{ ...S.btn, background: "transparent", color: "#8FA88A", padding: "4px 6px", marginLeft: "auto" }}>Cancel</button>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            );
          })}
          {log.length > 0 && (
            <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 4, fontWeight: 700, fontSize: 14 }}>
              <span>Day total</span><span>{totals.cal} kcal · {r1(totals.fb)}g fiber</span>
            </div>
          )}
        </div>

        {/* History / trends */}
        <div style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={S.label}>History &amp; trends</div>
            <button onClick={() => setShowHistory(!showHistory)} style={{ ...S.btn, background: "transparent", color: "#2C5E3F", padding: "4px 0" }}>{showHistory ? "Hide" : "Show"}</button>
          </div>
          {showHistory && (() => {
            // Build last 14 days of totals from allLogs
            const rows = [];
            for (let i = 0; i < 14; i++) {
              const d = new Date(date + "T12:00:00");
              d.setDate(d.getDate() - i);
              const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
              const items = allLogs[key] || [];
              if (items.length === 0 && i !== 0) continue;
              const t = items.reduce((s, x) => ({ cal: s.cal + x.cal, p: s.p + x.p, fb: s.fb + (x.fb || 0) }), { cal: 0, p: 0, fb: 0 });
              rows.push({ key, label: d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }), ...t, isToday: i === 0 });
            }
            const logged = rows.filter((r) => r.cal > 0);
            if (logged.length === 0) return <div style={{ fontSize: 13, color: "#5C6B5E", marginTop: 10 }}>No history yet — your logged days will show up here.</div>;
            const avg = (arr) => Math.round(arr.reduce((s, x) => s + x, 0) / arr.length);
            const avgCal = avg(logged.map((r) => r.cal));
            const avgP = avg(logged.map((r) => r.p));
            const maxCal = Math.max(...logged.map((r) => r.cal), goal);
            return (
              <div style={{ marginTop: 12 }}>
                <div style={{ display: "flex", gap: 20, flexWrap: "wrap", fontSize: 13, color: "#5C6B5E", marginBottom: 12 }}>
                  <span>{logged.length}-day avg: <b style={{ color: "#182420" }}>{avgCal} kcal</b></span>
                  <span>Avg protein: <b style={{ color: "#182420" }}>{avgP}g</b></span>
                  <span>Goal: <b style={{ color: "#182420" }}>{goal}</b></span>
                </div>
                {rows.map((r) => {
                  const pct = Math.min((r.cal / maxCal) * 100, 100);
                  const goalPct = Math.min((goal / maxCal) * 100, 100);
                  const over = r.cal > goal;
                  return (
                    <div key={r.key} style={{ marginBottom: 8 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 2 }}>
                        <span style={{ color: r.isToday ? "#2C5E3F" : "#5C6B5E", fontWeight: r.isToday ? 700 : 400 }}>{r.label}{r.isToday ? " · today" : ""}</span>
                        <span style={{ color: "#5C6B5E" }}>{r.cal ? `${r.cal} kcal · ${r1(r.p)}g P` : "—"}</span>
                      </div>
                      <div style={{ position: "relative", height: 8, background: "#E3E9DE", borderRadius: 4 }}>
                        {r.cal > 0 && <div style={{ height: 8, width: `${pct}%`, background: over ? "#C25E3A" : "#2C5E3F", borderRadius: 4 }} />}
                        <div style={{ position: "absolute", top: -2, left: `${goalPct}%`, width: 2, height: 12, background: "#182420", opacity: 0.4 }} title="goal" />
                      </div>
                    </div>
                  );
                })}
                <div style={{ fontSize: 11, color: "#8FA88A", marginTop: 8 }}>Bars show daily calories; the dark line marks your goal. Red means over goal.</div>
              </div>
            );
          })()}
        </div>

        <div style={{ textAlign: "center", fontSize: 12, color: "#8FA88A" }}>
          Data saves locally and, when connected, to greenplate-data.json in your Google Drive. Calorie values are typical estimates; the recommendation uses the Mifflin-St Jeor equation and is a starting point, not medical advice.
        </div>
      </div>

      {/* Undo toast */}
      {undoStack && (
        <div style={{ position: "fixed", left: "50%", bottom: 24, transform: "translateX(-50%)", background: "#182420", color: "#fff", borderRadius: 12, padding: "12px 16px", display: "flex", alignItems: "center", gap: 16, boxShadow: "0 6px 24px rgba(0,0,0,0.25)", zIndex: 100, fontFamily: "Inter, sans-serif", fontSize: 14, maxWidth: "90vw" }}>
          <span>Removed {undoStack.entry.name}</span>
          <button onClick={undoDelete} style={{ border: "none", background: "transparent", color: "#E9A23B", fontWeight: 700, cursor: "pointer", fontFamily: "Inter, sans-serif", fontSize: 14 }}>Undo</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<VegCalorieTracker />);
</script>
</body>
</html>
