/* ------------------------------------------------------------------ */
/* Google Drive sync (REST API + Google Identity Services)             */
/* ------------------------------------------------------------------ */
async function driveFindFile(token) {
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,modifiedTime)`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!r.ok) throw new Error(`Drive list failed: ${r.status}`);
  const j = await r.json();
  return j.files && j.files.length ? j.files[0] : null;
}

async function driveCreateFile(token, content) {
  const boundary = "gp_boundary_" + Date.now();
  const body =
    `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n` +
    JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: "application/json" }) +
    `\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n` +
    JSON.stringify(content) +
    `\r\n--${boundary}--`;
  const r = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
    body,
  });
  if (!r.ok) throw new Error(`Drive create failed: ${r.status}`);
  return (await r.json()).id;
}

async function driveUpdateFile(token, fileId, content) {
  const r = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: "PATCH",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(content),
  });
  if (!r.ok) throw new Error(`Drive update failed: ${r.status}`);
}

async function driveReadFile(token, fileId) {
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (!r.ok) throw new Error(`Drive read failed: ${r.status}`);
  return r.json();
}

/* ------------------------------------------------------------------ */
/* Calorie recommendation — Mifflin-St Jeor                            */
/* ------------------------------------------------------------------ */
const ACTIVITY = {
  sedentary: { factor: 1.2, label: "Sedentary (desk job, little exercise)" },
  light: { factor: 1.375, label: "Light (exercise 1–3 days/week)" },
  moderate: { factor: 1.55, label: "Moderate (exercise 3–5 days/week)" },
  active: { factor: 1.725, label: "Active (daily running + gym)" },
};
const TARGETS = {
  lose: { adj: -500, label: "Lose weight (~0.5 kg/week)" },
  maintain: { adj: 0, label: "Maintain weight" },
  gain: { adj: 300, label: "Gain muscle (lean bulk)" },
};

// Protein target g/kg by goal — grounded in Morton 2018 & Nunes meta-analyses.
// Maintain/gain: ~1.6–1.8 g/kg (plateau of muscle benefit). Fat loss: ~2.2 g/kg
// to preserve lean mass in a deficit (2.3–3.1 g/kg range in the literature).
const PROTEIN_PER_KG = { lose: 2.2, maintain: 1.6, gain: 1.8 };

function calcPlan(p) {
  const h = parseFloat(p.heightCm), w = parseFloat(p.weightKg), a = parseInt(p.age, 10);
  if (!h || !w || !a || h < 100 || h > 250 || w < 30 || w > 250 || a < 15 || a > 100) return null;
  const bmr = Math.round(10 * w + 6.25 * h - 5 * a + (p.sex === "male" ? 5 : -161));
  const tdee = Math.round(bmr * ACTIVITY[p.activity].factor);
  const recommended = Math.max(tdee + TARGETS[p.target].adj, 1200);
  const gPerKg = PROTEIN_PER_KG[p.target] || 1.6;
  return { bmr, tdee, recommended, protein: Math.round(w * gPerKg), gPerKg };
}

/* ------------------------------------------------------------------ */
/* Adaptive daily budget — rolls last 7 days' surplus/deficit forward. */
/* If you banked calories yesterday you get a little more today, and   */
/* vice-versa, nudged gently (±20% cap) toward your weekly average.    */
/* ------------------------------------------------------------------ */
function adaptiveBudget(baseGoal, allLogs, todayDate) {
  const dayTotal = (d) => (allLogs[d] || []).reduce((s, x) => s + x.cal, 0);
  const dates = [];
  for (let i = 1; i <= 7; i++) {
    const d = new Date(todayDate + "T12:00:00");
    d.setDate(d.getDate() - i);
    dates.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`);
  }
  const logged = dates.filter((d) => (allLogs[d] || []).length > 0);
  if (logged.length === 0) return { budget: baseGoal, cumDelta: 0, daysUsed: 0 };
  // cumulative surplus(+)/deficit(-) over logged days
  const cumDelta = logged.reduce((s, d) => s + (dayTotal(d) - baseGoal), 0);
  // spread the correction over the coming week, cap the daily nudge
  const rawAdjust = -cumDelta / 7;
  const cap = baseGoal * 0.2;
  const adjust = Math.max(Math.min(rawAdjust, cap), -cap);
  return { budget: Math.round(baseGoal + adjust), cumDelta: Math.round(cumDelta), daysUsed: logged.length, adjust: Math.round(adjust) };
}

/* ------------------------------------------------------------------ */
/* Fasting guidance — early time-restricted eating (16:8).             */
/* Evidence: TRE helps metabolic health mainly when the window is      */
/* earlier in the day; evening-loaded windows fare worse.              */
/* ------------------------------------------------------------------ */
function fastingAdvice(log, remaining, goal, target) {
  const now = new Date();
  const hour = now.getHours() + now.getMinutes() / 60;
  const eaten = goal - remaining;
  const pctEaten = goal > 0 ? eaten / goal : 0;
  // Recommend an early window: first meal ~9–10am, last calories by ~6pm.
  const windowStart = 9, windowEnd = 18; // 9h span, close enough to 16:8 with a morning coffee
  let status, tip, tone = "neutral";

  if (target === "gain") {
    return {
      title: "Fasting: optional for your goal",
      status: "You're in a muscle-gain phase, so a tight fast can make hitting protein and calories harder.",
      tip: "If you still want the metabolic perks, keep a gentle 12:12 (e.g. finish dinner by 8pm, break fast at 8am) rather than a long fast.",
      tone: "neutral",
    };
  }

  if (hour < windowStart) {
    status = `Still in your overnight fast (${Math.round(windowStart - hour)}h to your window).`;
    tip = "Black coffee, water, or plain tea are fine now. Aim to open your eating window around 9–10am and front-load the day.";
    tone = "good";
  } else if (hour <= 14) {
    status = "Prime eating window — earlier calories align with your circadian clock.";
    tip = pctEaten < 0.35
      ? "Good time for a solid, protein-forward meal while your window is wide open."
      : "Nicely on track. Keep the bigger meals earlier rather than saving them all for tonight.";
    tone = "good";
  } else if (hour <= windowEnd) {
    const hrsLeft = Math.round(windowEnd - hour);
    status = `About ${hrsLeft}h left in an early 16:8 window (aim to finish calories by ~6pm).`;
    tip = remaining > goal * 0.4
      ? `You still have ${Math.round(remaining)} kcal but not much window — eat your main meal now rather than late.`
      : "You're pacing well. Wrap up eating in the next couple hours to bank the overnight fast.";
    tone = remaining > goal * 0.4 ? "warn" : "good";
  } else {
    status = "Past ~6pm — the ideal early window has closed.";
    tip = remaining > 250
      ? `You have ${Math.round(remaining)} kcal left. If you eat, keep it light and high-protein (tofu, dal, a shake) rather than carb-heavy, and start your fast after.`
      : "You're near your goal — a good point to stop eating and begin your ~16h overnight fast.";
    tone = "warn";
  }
  return { title: "Fasting window (early 16:8)", status, tip, tone };
}

/* ------------------------------------------------------------------ */
/* Suggestion engine — protein- and fiber-aware                        */
/* ------------------------------------------------------------------ */
function getSuggestions(mode, remaining, proteinGap, fiberGap, log) {
  const eaten = new Set(log.map((l) => l.name));
  let pool = FOODS.filter((f) => (mode === "vegan" ? f.vegan : true));
  if (remaining <= 0)
    return { list: [], note: "You've hit your calorie goal for today. Water, black coffee, or rasam if you need something warm." };

  pool = pool.filter((f) => f.cal <= remaining + 30 && f.cal >= 30);
  const needProtein = proteinGap > 12;
  const needFiber = fiberGap > 8;
  const lightDay = remaining < 250;

  const scored = pool.map((f) => {
    let score = 0;
    const pDensity = f.p / Math.max(f.cal, 1);
    const fbDensity = f.fb / Math.max(f.cal, 1);
    score += pDensity * (needProtein ? 400 : 120);
    score += fbDensity * (needFiber ? 900 : 200);
    if (lightDay && f.cal <= remaining) score += 40;
    if (eaten.has(f.name)) score -= 60;
    score += (1 - Math.abs(f.cal - Math.min(remaining, 350)) / 400) * 25;
    return { ...f, score };
  });

  scored.sort((a, b) => b.score - a.score);
  const list = scored.slice(0, 4).map((f) => ({
    ...f,
    reason:
      needProtein && f.p >= 8
        ? `${f.p}g protein per ${perLabel(f)} — you're ${proteinGap}g short`
        : needFiber && f.fb >= 4
        ? `${f.fb}g fiber per ${perLabel(f)} — you're ${fiberGap}g short`
        : lightDay
        ? `Light at ${f.cal} kcal — fits your remaining budget`
        : `Balanced pick, leaves ${remaining - f.cal} kcal to spare`,
  }));

  const note = needProtein
    ? `Protein is running behind (${proteinGap}g to go)${needFiber ? ` and fiber too (${fiberGap}g)` : ""}, so these lean that way.`
    : needFiber
    ? `Fiber is running behind (${fiberGap}g to go) — these picks help close the gap.`
    : lightDay
    ? "Not much room left — keeping these light."
    : "You have room for a proper meal. Picks below keep the day balanced.";

  return { list, note };
}

/* ------------------------------------------------------------------ */
/* Gauge                                                               */
/* ------------------------------------------------------------------ */
function Gauge({ goal, consumed }) {
  const pct = Math.min(consumed / Math.max(goal, 1), 1);
  const over = consumed > goal;
  const R = 130, CX = 160, CY = 155;
  const start = Math.PI, end = 0;
  const angle = start - pct * Math.PI;
  const arc = (a0, a1, r) => {
    const x0 = CX + r * Math.cos(a0), y0 = CY - r * Math.sin(a0);
    const x1 = CX + r * Math.cos(a1), y1 = CY - r * Math.sin(a1);
    const large = a0 - a1 > Math.PI ? 1 : 0;
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  };
  const ticks = [];
  for (let i = 0; i <= 20; i++) {
    const a = start - (i / 20) * Math.PI;
    const long = i % 5 === 0;
    const ra = R + 10, rb = R + (long ? 24 : 17);
    ticks.push(
      <line key={i}
        x1={CX + ra * Math.cos(a)} y1={CY - ra * Math.sin(a)}
        x2={CX + rb * Math.cos(a)} y2={CY - rb * Math.sin(a)}
        stroke="#B9C6B4" strokeWidth={long ? 2 : 1} />
    );
  }
  const remaining = goal - consumed;
  return (
    <svg viewBox="0 0 320 190" style={{ width: "100%", maxWidth: 400, display: "block", margin: "0 auto" }}>
      {ticks}
      <path d={arc(start, end, R)} fill="none" stroke="#E3E9DE" strokeWidth="16" strokeLinecap="round" />
      {pct > 0.01 && (
        <path d={arc(start, angle, R)} fill="none" stroke={over ? "#C25E3A" : "url(#gaugeGrad)"} strokeWidth="16" strokeLinecap="round" />
      )}
      <defs>
        <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#2C5E3F" />
          <stop offset="100%" stopColor="#E9A23B" />
        </linearGradient>
      </defs>
      <text x={CX} y={CY - 34} textAnchor="middle" style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 54, fill: over ? "#C25E3A" : "#182420" }}>
        {Math.abs(Math.round(remaining))}
      </text>
      <text x={CX} y={CY - 8} textAnchor="middle" style={{ fontFamily: "Inter, sans-serif", fontSize: 13, letterSpacing: 2, fill: "#5C6B5E", textTransform: "uppercase" }}>
        {over ? "kcal over" : "kcal left"}
      </text>
    </svg>
  );
}

/* ------------------------------------------------------------------ */
/* Weight chart — actual vs expected trajectory                        */
/* ------------------------------------------------------------------ */
function WeightChart({ weights, target, unit }) {
  if (weights.length < 2) return null;
  const W = 560, H = 200, PAD = { l: 44, r: 14, t: 14, b: 26 };
  const toUnit = (kg) => (unit === "kg" ? kg : kg * 2.2046);
  const days = (d) => new Date(d + "T12:00:00").getTime() / 86400000;

  const x0 = days(weights[0].date), x1 = days(weights[weights.length - 1].date);
  const span = Math.max(x1 - x0, 1);
  const slopePerDay = target === "lose" ? -0.5 / 7 : target === "gain" ? 0.25 / 7 : 0;
  const expected = weights.map((w) => ({ date: w.date, kg: weights[0].kg + slopePerDay * (days(w.date) - x0) }));

  const allVals = [...weights.map((w) => toUnit(w.kg)), ...expected.map((w) => toUnit(w.kg))];
  let yMin = Math.min(...allVals), yMax = Math.max(...allVals);
  const padY = Math.max((yMax - yMin) * 0.2, unit === "kg" ? 0.5 : 1);
  yMin -= padY; yMax += padY;

  const X = (d) => PAD.l + ((days(d) - x0) / span) * (W - PAD.l - PAD.r);
  const Y = (v) => H - PAD.b - ((v - yMin) / (yMax - yMin)) * (H - PAD.t - PAD.b);
  const pts = (arr) => arr.map((w) => `${X(w.date)},${Y(toUnit(w.kg))}`).join(" ");
  const fmt = (v) => (unit === "kg" ? v.toFixed(1) : Math.round(v));
  const dateLabel = (d) => new Date(d + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" });

  const grid = [];
  for (let i = 0; i <= 3; i++) {
    const v = yMin + ((yMax - yMin) * i) / 3;
    grid.push(
      <g key={i}>
        <line x1={PAD.l} y1={Y(v)} x2={W - PAD.r} y2={Y(v)} stroke="#EDF1EA" strokeWidth="1" />
        <text x={PAD.l - 6} y={Y(v) + 4} textAnchor="end" style={{ fontSize: 11, fill: "#8FA88A", fontFamily: "Inter, sans-serif" }}>{fmt(v)}</text>
      </g>
    );
  }

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", display: "block" }}>
      {grid}
      {slopePerDay !== 0 && <polyline points={pts(expected)} fill="none" stroke="#E9A23B" strokeWidth="2" strokeDasharray="6 5" />}
      <polyline points={pts(weights)} fill="none" stroke="#2C5E3F" strokeWidth="2.5" strokeLinejoin="round" />
      {weights.map((w) => (
        <circle key={w.date} cx={X(w.date)} cy={Y(toUnit(w.kg))} r="4" fill="#2C5E3F" stroke="#fff" strokeWidth="1.5" />
      ))}
      <text x={PAD.l} y={H - 8} style={{ fontSize: 11, fill: "#8FA88A", fontFamily: "Inter, sans-serif" }}>{dateLabel(weights[0].date)}</text>
      <text x={W - PAD.r} y={H - 8} textAnchor="end" style={{ fontSize: 11, fill: "#8FA88A", fontFamily: "Inter, sans-serif" }}>{dateLabel(weights[weights.length - 1].date)}</text>
    </svg>
  );
}

/* ------------------------------------------------------------------ */
/* Main app                                                            */
/* ------------------------------------------------------------------ */
function VegCalorieTracker() {
  const [goal, setGoal] = useState(2000);
  const [mode, setMode] = useState("vegetarian");
  const [allLogs, setAllLogs] = useState({}); // { 'YYYY-MM-DD': [entries] }
  const [query, setQuery] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [pending, setPending] = useState(null);
  const [custom, setCustom] = useState({ name: "", cal: "", p: "", fb: "" });
  const [showCustom, setShowCustom] = useState(false);
  const [product, setProduct] = useState({ name: "", cal: "", p: "", fb: "", qty: 1, meal: "", yuka: "" });
  const [showProduct, setShowProduct] = useState(false);
  const [savedProducts, setSavedProducts] = useState([]); // [{ name, cal, p, fb, yuka }]
  const [showImport, setShowImport] = useState(false);
  const [dayText, setDayText] = useState("");
  const [importMsg, setImportMsg] = useState(null);
  const [copyMenuFor, setCopyMenuFor] = useState(null); // id of item whose copy menu is open
  const [savedMealFor, setSavedMealFor] = useState(null); // name of saved product whose meal picker is open
  const [copyQty, setCopyQty] = useState(1); // servings multiplier for the open copy menu
  const [savedQty, setSavedQty] = useState(1); // servings for the open saved-product picker
  const fileInputRef = useRef(null);
  const [profile, setProfile] = useState({ heightCm: "", weightKg: "", age: "", sex: "male", activity: "moderate", target: "maintain", fasting: true });
  const [showProfile, setShowProfile] = useState(false);
  const [units, setUnits] = useState({ height: "cm", weight: "kg" });
  const [weights, setWeights] = useState([]);
  const [weightInput, setWeightInput] = useState("");
  const [water, setWater] = useState({}); // { 'YYYY-MM-DD': glasses }
  const [templates, setTemplates] = useState([]); // [{ name, items: [logEntry...] }]
  const [showTemplates, setShowTemplates] = useState(false);
  const [tmplName, setTmplName] = useState("");
  const [undoStack, setUndoStack] = useState(null); // { entry, dateKey } for last delete
  const [editingProduct, setEditingProduct] = useState(null); // name of product being edited
  const [editVals, setEditVals] = useState({ cal: "", p: "", fb: "", yuka: "" });
  const [showHistory, setShowHistory] = useState(false);
  const undoTimerRef = useRef(null);
  const [drive, setDrive] = useState({ connected: false, syncing: false, lastSync: null, error: null });

  const date = todayKey();
  const log = allLogs[date] || [];
  const setLog = (fn) => setAllLogs((all) => ({ ...all, [date]: typeof fn === "function" ? fn(all[date] || []) : fn }));

  const tokenRef = useRef(null);
  const fileIdRef = useRef(null);
  const tokenClientRef = useRef(null);
  const pushTimerRef = useRef(null);
  const skipNextPushRef = useRef(false);

  const clientIdConfigured = GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.startsWith("PASTE_");

  /* ---------- Load local data on start ---------- */
  useEffect(() => {
    const d = loadLocal();
    if (d) {
      applyBlob(d);
    } else {
      setShowProfile(true);
    }
    setLoaded(true);
    // If the user enabled Drive before, try a silent reconnect once GIS loads
    if (clientIdConfigured && localStorage.getItem(LS_DRIVE_FLAG) === "1") {
      const iv = setInterval(() => {
        if (window.google?.accounts?.oauth2) {
          clearInterval(iv);
          initTokenClient();
          tokenClientRef.current?.requestAccessToken({ prompt: "" });
        }
      }, 300);
      setTimeout(() => clearInterval(iv), 8000);
    }
  }, []);

  const assembleBlob = () => ({
    settings: { goal, mode, profile },
    logs: allLogs,
    weights,
    savedProducts,
    water,
    templates,
    updatedAt: Date.now(),
  });

  function applyBlob(d) {
    skipNextPushRef.current = true;
    if (d.settings) {
      if (d.settings.goal) setGoal(d.settings.goal);
      if (d.settings.mode) setMode(d.settings.mode);
      if (d.settings.profile) setProfile(d.settings.profile);
    }
    if (d.logs) setAllLogs(d.logs);
    if (d.weights) setWeights(d.weights);
    if (d.savedProducts) setSavedProducts(d.savedProducts);
    if (d.water) setWater(d.water);
    if (d.templates) setTemplates(d.templates);
  }

  /* ---------- Persist locally + schedule Drive push on any change ---------- */
  useEffect(() => {
    if (!loaded) return;
    const blob = assembleBlob();
    saveLocal(blob);
    if (skipNextPushRef.current) { skipNextPushRef.current = false; return; }
    if (drive.connected && tokenRef.current) {
      clearTimeout(pushTimerRef.current);
      pushTimerRef.current = setTimeout(() => pushToDrive(blob), 2000);
    }
  }, [goal, mode, profile, allLogs, weights, savedProducts, water, templates, loaded]);

  /* ---------- Google Drive ---------- */
  function initTokenClient() {
    if (tokenClientRef.current || !window.google?.accounts?.oauth2) return;
    tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: async (resp) => {
        if (resp.error) {
          setDrive((s) => ({ ...s, error: "Google sign-in failed", syncing: false }));
          return;
        }
        tokenRef.current = resp.access_token;
        localStorage.setItem(LS_DRIVE_FLAG, "1");
        await initialSync();
      },
    });
  }

  function connectDrive() {
    if (!clientIdConfigured) return;
    initTokenClient();
    setDrive((s) => ({ ...s, error: null }));
    tokenClientRef.current?.requestAccessToken({ prompt: localStorage.getItem(LS_DRIVE_FLAG) === "1" ? "" : "consent" });
  }

  function disconnectDrive() {
    tokenRef.current = null;
    fileIdRef.current = null;
    localStorage.removeItem(LS_DRIVE_FLAG);
    setDrive({ connected: false, syncing: false, lastSync: null, error: null });
  }

  async function initialSync() {
    setDrive((s) => ({ ...s, syncing: true, error: null }));
    try {
      const token = tokenRef.current;
      let file = await driveFindFile(token);
      const local = loadLocal() || assembleBlob();
      if (!file) {
        fileIdRef.current = await driveCreateFile(token, local);
      } else {
        fileIdRef.current = file.id;
        const remote = await driveReadFile(token, file.id);
        if (remote && (remote.updatedAt || 0) > (local.updatedAt || 0)) {
          applyBlob(remote);      // Drive is newer → pull
          saveLocal(remote);
        } else {
          await driveUpdateFile(token, file.id, local); // local is newer → push
        }
      }
      setDrive({ connected: true, syncing: false, lastSync: new Date(), error: null });
    } catch (e) {
      setDrive((s) => ({ ...s, syncing: false, error: "Sync failed — try reconnecting." }));
    }
  }

  async function pushToDrive(blob) {
    if (!tokenRef.current || !fileIdRef.current) return;
    setDrive((s) => ({ ...s, syncing: true }));
    try {
      await driveUpdateFile(tokenRef.current, fileIdRef.current, blob);
      setDrive((s) => ({ ...s, syncing: false, lastSync: new Date(), error: null }));
    } catch (e) {
      // Token likely expired — try one silent refresh, otherwise surface it
      setDrive((s) => ({ ...s, syncing: false, error: "Session expired — tap Sync now to reconnect." }));
      tokenRef.current = null;
      setDrive((s) => ({ ...s, connected: false }));
    }
  }

  const syncNow = () => {
    if (tokenRef.current && fileIdRef.current) pushToDrive(assembleBlob());
    else connectDrive();
  };

  /* ---------- Derived values ---------- */
  const totals = useMemo(
    () => log.reduce((t, x) => ({ cal: t.cal + x.cal, p: t.p + x.p, c: t.c + x.c, f: t.f + x.f, fb: t.fb + (x.fb || 0) }), { cal: 0, p: 0, c: 0, f: 0, fb: 0 }),
    [log]
  );
  const plan = useMemo(() => calcPlan(profile), [profile]);
  // Adaptive budget: today's goal nudged by the last 7 days' surplus/deficit.
  const adaptive = useMemo(() => adaptiveBudget(goal, allLogs, date), [goal, allLogs, date]);
  const todayBudget = adaptive.budget;
  const remaining = todayBudget - totals.cal;
  const proteinTarget = plan ? plan.protein : Math.round((goal * 0.25) / 4);
  const fiberTarget = Math.round((todayBudget / 1000) * 14);
  const proteinGap = Math.max(Math.round(proteinTarget - totals.p), 0);
  const fiberGap = Math.max(Math.round(fiberTarget - totals.fb), 0);
  const fasting = useMemo(
    () => (profile.fasting ? fastingAdvice(log, remaining, todayBudget, profile.target) : null),
    [log, remaining, todayBudget, profile.fasting, profile.target]
  );

  const mealTotals = useMemo(() => {
    const t = {};
    MEALS.forEach((m) => (t[m.id] = 0));
    log.forEach((x) => { t[x.meal] = (t[x.meal] || 0) + x.cal; });
    return t;
  }, [log]);

  const { list: suggestions, note } = useMemo(
    () => getSuggestions(mode, remaining, proteinGap, fiberGap, log),
    [mode, remaining, proteinGap, fiberGap, log]
  );

  const results = useMemo(() => {
    if (!query.trim()) return [];
    const q = query.toLowerCase();
    return FOODS.filter((f) => (mode === "vegan" ? f.vegan : true) && f.name.toLowerCase().includes(q)).slice(0, 6);
  }, [query, mode]);

  const scale = (food, qty) => {
    const k = qty / food.per;
    return { cal: Math.round(food.cal * k), p: r1(food.p * k), c: r1(food.c * k), f: r1(food.f * k), fb: r1(food.fb * k) };
  };

  const startAdd = (food) => {
    setPending({ food, qty: food.unit === "g" ? 100 : food.unit === "pc" && food.name === "Idli" ? 2 : 1, meal: defaultMealNow() });
    setQuery("");
  };

  const confirmAdd = () => {
    if (!pending || !pending.qty || pending.qty <= 0) return;
    const { food, qty, meal } = pending;
    const s = scale(food, qty);
    const qtyLabel = food.unit === "g" ? `${qty} g` : `${qty} ${unitLabel(food)}${qty > 1 && food.unit === "pc" ? "s" : ""}`;
    setLog((l) => [...l, { name: food.name, qtyLabel, meal, ...s, id: Date.now() + Math.random() }]);
    setPending(null);
  };

  const addCustom = () => {
    const cal = parseInt(custom.cal, 10);
    if (!custom.name.trim() || !cal || cal <= 0) return;
    setLog((l) => [...l, {
      name: custom.name.trim(), qtyLabel: "1 serving", meal: defaultMealNow(),
      cal, p: parseFloat(custom.p) || 0, c: 0, f: 0, fb: parseFloat(custom.fb) || 0,
      id: Date.now() + Math.random(),
    }]);
    setCustom({ name: "", cal: "", p: "", fb: "" });
    setShowCustom(false);
  };

  const addProduct = () => {
    const calPer = parseFloat(product.cal), pPer = parseFloat(product.p);
    const qty = product.qty || 1;
    if (!product.name.trim() || !calPer || calPer <= 0) return;
    const meal = product.meal || defaultMealNow();
    const name = product.name.trim();
    const fbPer = parseFloat(product.fb) || 0;
    setLog((l) => [...l, {
      name,
      qtyLabel: `${qty} serving${qty !== 1 ? "s" : ""}`,
      meal,
      cal: Math.round(calPer * qty),
      p: r1((pPer || 0) * qty),
      c: 0, f: 0,
      fb: r1(fbPer * qty),
      id: Date.now() + Math.random(),
    }]);
    // Remember this product for one-tap re-adding later (dedupe by name, keep latest values)
    setSavedProducts((sp) => {
      const rest = sp.filter((x) => x.name.toLowerCase() !== name.toLowerCase());
      return [{ name, cal: calPer, p: pPer || 0, fb: fbPer, yuka: product.yuka || "" }, ...rest].slice(0, 40);
    });
    setProduct({ name: "", cal: "", p: "", fb: "", qty: 1, meal: "", yuka: "" });
    setShowProduct(false);
  };

  // One-tap re-add a saved product (1 serving, current meal)
  const quickAddSaved = (sp, meal, qty = 1) => {
    const q = qty && qty > 0 ? qty : 1;
    setLog((l) => [...l, {
      name: sp.name,
      qtyLabel: `${q} serving${q !== 1 ? "s" : ""}`,
      meal: meal || defaultMealNow(),
      cal: Math.round(sp.cal * q),
      p: r1(sp.p * q),
      c: 0, f: 0,
      fb: r1((sp.fb || 0) * q),
      id: Date.now() + Math.random(),
    }]);
    setSavedMealFor(null);
    setSavedQty(1);
  };

  const removeSaved = (name) => setSavedProducts((sp) => sp.filter((x) => x.name !== name));

  const removeFood = (id) => {
    const entry = log.find((x) => x.id === id);
    setLog((l) => l.filter((x) => x.id !== id));
    if (entry) {
      setUndoStack({ entry, dateKey: date });
      clearTimeout(undoTimerRef.current);
      undoTimerRef.current = setTimeout(() => setUndoStack(null), 6000);
    }
  };

  const undoDelete = () => {
    if (!undoStack) return;
    const { entry, dateKey } = undoStack;
    setAllLogs((all) => ({ ...all, [dateKey]: [...(all[dateKey] || []), entry] }));
    setUndoStack(null);
    clearTimeout(undoTimerRef.current);
  };

  /* ---------- Copy a previous day into today ---------- */
  const yesterdayKey = () => {
    const d = new Date(date + "T12:00:00");
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
  };

  const copyDayIntoToday = (fromKey) => {
    const src = allLogs[fromKey] || [];
    if (!src.length) return;
    const clones = src.map((x) => ({ ...x, id: Date.now() + Math.random() * (1 + Math.random()) }));
    setLog((l) => [...l, ...clones]);
  };

  /* ---------- Meal templates ---------- */
  const saveTemplate = () => {
    if (!tmplName.trim() || log.length === 0) return;
    const items = log.map((x) => ({ name: x.name, qtyLabel: x.qtyLabel, meal: x.meal, cal: x.cal, p: x.p, c: x.c, f: x.f, fb: x.fb || 0 }));
    setTemplates((t) => [{ name: tmplName.trim(), items }, ...t.filter((x) => x.name.toLowerCase() !== tmplName.trim().toLowerCase())].slice(0, 20));
    setTmplName("");
  };

  const applyTemplate = (tmpl) => {
    const clones = tmpl.items.map((x) => ({ ...x, id: Date.now() + Math.random() * (1 + Math.random()) }));
    setLog((l) => [...l, ...clones]);
  };

  const removeTemplate = (name) => setTemplates((t) => t.filter((x) => x.name !== name));

  /* ---------- Edit a saved product ---------- */
  const startEditProduct = (sp) => {
    setEditingProduct(sp.name);
    setEditVals({ cal: String(sp.cal), p: String(sp.p), fb: String(sp.fb || 0), yuka: sp.yuka || "" });
  };

  const saveEditProduct = (name) => {
    const cal = parseFloat(editVals.cal);
    if (!cal || cal <= 0) return;
    setSavedProducts((sp) => sp.map((x) => x.name === name
      ? { ...x, cal, p: parseFloat(editVals.p) || 0, fb: parseFloat(editVals.fb) || 0, yuka: editVals.yuka || "" }
      : x));
    setEditingProduct(null);
  };

  /* ---------- Water ---------- */
  const waterToday = water[date] || 0;
  const setWaterToday = (n) => setWater((w) => ({ ...w, [date]: Math.max(n, 0) }));

  // Copy an already-logged item into another meal, scaling by a servings multiplier
  const copyToMeal = (item, targetMeal, qty = 1) => {
    const q = qty && qty > 0 ? qty : 1;
    // The original item already represents 1 "log entry"; multiply its values by q
    const label = q === 1 ? item.qtyLabel : `${item.qtyLabel} ×${q}`;
    setLog((l) => [...l, {
      ...item,
      meal: targetMeal,
      qtyLabel: label,
      cal: Math.round(item.cal * q),
      p: r1(item.p * q),
      c: r1(item.c * q),
      f: r1(item.f * q),
      fb: r1((item.fb || 0) * q),
      id: Date.now() + Math.random(),
    }]);
    setCopyMenuFor(null);
    setCopyQty(1);
  };

  /* ---------- Quick day import: parse loose totals text ---------- */
  // Accepts things like "1850 cal, 95 protein, 24 fiber" / "1850 kcal 95p 24f"
  // Returns { cal, p, fb } with whatever it can find.
  function parseDayTotals(text) {
    // Strip commas used as thousands separators (1,850 -> 1850), keep other spacing
    const cleaned = text.replace(/(\d),(\d)/g, "$1$2");
    const t = " " + cleaned.toLowerCase() + " ";
    const grab = (patterns) => {
      for (const re of patterns) {
        const m = t.match(re);
        if (m) return parseFloat(m[1]);
      }
      return null;
    };
    // Labeled forms first (most reliable), then shorthand like "95p" (macro-sized only)
    const p = grab([/protein\s*:\s*(\d+(?:\.\d+)?)/, /(\d+(?:\.\d+)?)\s*g?\s*(?:protein|prot)\b/, /\b(\d{1,3}(?:\.\d+)?)\s*p\b/]);
    const fb = grab([/(?:fiber|fibre)\s*:\s*(\d+(?:\.\d+)?)/, /(\d+(?:\.\d+)?)\s*g?\s*(?:fiber|fibre|fib)\b/, /\b(\d{1,3}(?:\.\d+)?)\s*f\b/]);
    // number-before-keyword (e.g. "1850 kcal") first, then "calories: 1850"
    let cal = grab([/(\d+(?:\.\d+)?)\s*(?:kcal|calories|cals|cal)\b/, /(?:calories|kcal)\s*:\s*(\d+(?:\.\d+)?)/]);
    // fallback: if no calorie keyword, take the largest number ≥200 that isn't the protein/fiber value
    if (cal == null) {
      const nums = (cleaned.match(/\d+(?:\.\d+)?/g) || []).map(Number).filter((n) => n >= 200 && n !== p && n !== fb);
      if (nums.length) cal = Math.max(...nums);
    }
    return { cal, p, fb };
  }

  const importDayTotals = () => {
    const { cal, p, fb } = parseDayTotals(dayText);
    if (!cal || cal <= 0) { setImportMsg({ ok: false, text: "Couldn't find a calorie number. Try e.g. \"1850 cal, 95 protein, 24 fiber\"." }); return; }
    // Log as a single summary entry so it doesn't clutter meals
    setLog((l) => [
      ...l.filter((x) => x.name !== "Day totals (imported)"), // replace prior import for the day
      { name: "Day totals (imported)", qtyLabel: "whole day", meal: "breakfast",
        cal: Math.round(cal), p: r1(p || 0), c: 0, f: 0, fb: r1(fb || 0), id: Date.now() + Math.random() },
    ]);
    setImportMsg({ ok: true, text: `Logged ${Math.round(cal)} kcal${p ? `, ${r1(p)}g protein` : ""}${fb ? `, ${r1(fb)}g fiber` : ""} for today.` });
    setDayText("");
  };

  /* ---------- CSV import (Cronometer "Servings"/"Food & Recipe" exports) ---------- */
  function parseCSV(text) {
    const rows = [];
    let cur = [], field = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (inQ) {
        if (ch === '"' && text[i + 1] === '"') { field += '"'; i++; }
        else if (ch === '"') inQ = false;
        else field += ch;
      } else {
        if (ch === '"') inQ = true;
        else if (ch === ",") { cur.push(field); field = ""; }
        else if (ch === "\n" || ch === "\r") { if (field !== "" || cur.length) { cur.push(field); rows.push(cur); cur = []; field = ""; } if (ch === "\r" && text[i + 1] === "\n") i++; }
        else field += ch;
      }
    }
    if (field !== "" || cur.length) { cur.push(field); rows.push(cur); }
    return rows;
  }

  const handleCSV = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const rows = parseCSV(String(e.target.result));
        if (rows.length < 2) { setImportMsg({ ok: false, text: "That CSV looks empty." }); return; }
        const header = rows[0].map((h) => h.trim().toLowerCase());
        const idx = (names) => header.findIndex((h) => names.some((n) => h === n || h.includes(n)));
        const iDate = idx(["day", "date"]);
        const iName = idx(["food name", "food", "name"]);
        const iCal = idx(["energy (kcal)", "energy", "calories", "kcal"]);
        const iP = idx(["protein (g)", "protein"]);
        const iFb = idx(["fiber (g)", "fibre (g)", "fiber", "fibre"]);
        if (iCal === -1) { setImportMsg({ ok: false, text: "Couldn't find a calorie/energy column in that CSV." }); return; }
        const byDay = {};
        let count = 0;
        for (let r = 1; r < rows.length; r++) {
          const row = rows[r];
          if (!row || row.length <= iCal) continue;
          const cal = parseFloat(row[iCal]); if (!cal) continue;
          let d = iDate !== -1 ? (row[iDate] || "").trim() : date;
          // normalize common date formats to YYYY-MM-DD
          const dm = d.match(/(\d{4})[-/](\d{1,2})[-/](\d{1,2})/) || d.match(/(\d{1,2})[-/](\d{1,2})[-/](\d{4})/);
          if (dm) { d = dm[1].length === 4 ? `${dm[1]}-${String(dm[2]).padStart(2,"0")}-${String(dm[3]).padStart(2,"0")}` : `${dm[3]}-${String(dm[2]).padStart(2,"0")}-${String(dm[1]).padStart(2,"0")}`; }
          else d = date;
          (byDay[d] = byDay[d] || []).push({
            name: (iName !== -1 && row[iName]) ? row[iName].trim().slice(0, 60) : "Imported item",
            qtyLabel: "imported", meal: "lunch",
            cal: Math.round(cal), p: r1(parseFloat(row[iP]) || 0), c: 0, f: 0, fb: r1(parseFloat(row[iFb]) || 0),
            id: Date.now() + Math.random() + r,
          });
          count++;
        }
        const days = Object.keys(byDay);
        if (!count) { setImportMsg({ ok: false, text: "No rows with calories found." }); return; }
        setAllLogs((all) => {
          const next = { ...all };
          days.forEach((d) => {
            const existing = (next[d] || []).filter((x) => x.qtyLabel !== "imported"); // replace previous import for that day
            next[d] = [...existing, ...byDay[d]];
          });
          return next;
        });
        setImportMsg({ ok: true, text: `Imported ${count} items across ${days.length} day${days.length !== 1 ? "s" : ""}.` });
      } catch (err) {
        setImportMsg({ ok: false, text: "Couldn't read that file — is it a CSV?" });
      }
    };
    reader.readAsText(file);
  };

  const logWeight = () => {
    const v = parseFloat(weightInput);
    if (!v || v <= 0) return;
    const kg = Math.round((units.weight === "kg" ? v : v / 2.2046) * 10) / 10;
    if (kg < 30 || kg > 250) return;
    setWeights((w) => {
      const next = w.filter((x) => x.date !== date);
      next.push({ date, kg });
      next.sort((a, b) => (a.date < b.date ? -1 : 1));
      return next;
    });
    setProfile((p) => ({ ...p, weightKg: String(kg) }));
    setWeightInput("");
  };

  const removeWeight = (d) => setWeights((w) => w.filter((x) => x.date !== d));

  const maxFit = useMemo(() => {
    if (!pending || remaining <= 0) return null;
    const perUnitCal = pending.food.cal / pending.food.per;
    if (pending.food.unit === "g") {
      const g = Math.floor(remaining / perUnitCal / 10) * 10;
      return g >= 10 ? `${g} g` : null;
    }
    const n = Math.floor(remaining / perUnitCal);
    return n >= 1 ? `${n} ${unitLabel(pending.food)}${n > 1 && pending.food.unit === "pc" ? "s" : ""}` : null;
  }, [pending, remaining]);

  const macroBar = (label, val, target, color) => (
    <div style={{ flex: 1, minWidth: 90 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#5C6B5E", marginBottom: 4 }}>
        <span style={{ fontWeight: 600, color: "#182420" }}>{label}</span>
        <span>{r1(val)}g{target ? ` / ${target}g` : ""}</span>
      </div>
      <div style={{ height: 6, background: "#E3E9DE", borderRadius: 3 }}>
        <div style={{ height: 6, width: `${Math.min((val / (target || val || 1)) * 100, 100)}%`, background: color, borderRadius: 3, transition: "width .3s" }} />
      </div>
    </div>
  );

  const S = {
    page: { minHeight: "100vh", background: "#F1F4EC", fontFamily: "Inter, sans-serif", color: "#182420", padding: "20px 16px 60px" },
    wrap: { maxWidth: 640, margin: "0 auto" },
    card: { background: "#FFFFFF", border: "1px solid #DFE7DA", borderRadius: 16, padding: 20, marginBottom: 16 },
    h1: { fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 800, fontSize: 26, margin: 0, letterSpacing: -0.5 },
    label: { fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#5C6B5E", fontWeight: 600 },
    btn: { border: "none", borderRadius: 10, padding: "10px 16px", fontWeight: 600, fontSize: 14, cursor: "pointer", fontFamily: "Inter, sans-serif" },
    input: { width: "100%", boxSizing: "border-box", padding: "12px 14px", borderRadius: 10, border: "1px solid #C9D5C3", fontSize: 15, fontFamily: "Inter, sans-serif", background: "#FBFCF9", outline: "none" },
    chip: (active) => ({ border: "1px solid " + (active ? "#2C5E3F" : "#C9D5C3"), borderRadius: 20, padding: "7px 14px", fontSize: 13, fontWeight: 600, cursor: "pointer", background: active ? "#2C5E3F" : "#FBFCF9", color: active ? "#fff" : "#5C6B5E", fontFamily: "Inter, sans-serif" }),
  };

  const timeStr = (d) => d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  return (
    <div style={S.page}>
      <div style={S.wrap}>
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 10 }}>
          <div>
            <h1 style={S.h1}>Green Plate</h1>
            <div style={{ fontSize: 13, color: "#5C6B5E" }}>{new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</div>
          </div>
          <div style={{ display: "flex", background: "#E3E9DE", borderRadius: 10, padding: 3 }}>
            {["vegetarian", "vegan"].map((m) => (
              <button key={m} onClick={() => setMode(m)} style={{ ...S.btn, padding: "8px 14px", background: mode === m ? "#2C5E3F" : "transparent", color: mode === m ? "#fff" : "#5C6B5E" }}>
                {m === "vegetarian" ? "Vegetarian" : "Vegan"}
              </button>
            ))}
          </div>
        </div>

        {/* Drive sync strip */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, fontSize: 13, color: "#5C6B5E", flexWrap: "wrap" }}>
          <span style={{ width: 8, height: 8, borderRadius: 4, background: drive.connected ? "#2C5E3F" : "#B9C6B4", display: "inline-block" }} />
          {!clientIdConfigured ? (
            <span>Saving on this device. To enable Google Drive sync, add your Client ID in index.html (see README).</span>
          ) : drive.connected ? (
            <>
              <span>{drive.syncing ? "Syncing to Drive…" : drive.lastSync ? `Synced to your Drive at ${timeStr(drive.lastSync)}` : "Connected to Drive"}</span>
              <button onClick={syncNow} style={{ ...S.btn, padding: "4px 8px", background: "transparent", color: "#2C5E3F" }}>Sync now</button>
              <button onClick={disconnectDrive} style={{ ...S.btn, padding: "4px 8px", background: "transparent", color: "#8FA88A" }}>Disconnect</button>
            </>
          ) : (
            <>
              <span>Saving on this device only.</span>
              <button onClick={connectDrive} style={{ ...S.btn, padding: "6px 12px", background: "#2C5E3F", color: "#fff" }}>Connect Google Drive</button>
            </>
          )}
          {drive.error && <span style={{ color: "#C25E3A" }}>{drive.error}</span>}
        </div>

        {/* Gauge card */}
        <div style={S.card}>
          <Gauge goal={todayBudget} consumed={totals.cal} />
          <div style={{ display: "flex", justifyContent: "center", gap: 24, marginTop: 8, fontSize: 13, color: "#5C6B5E", flexWrap: "wrap" }}>
            <span>Eaten <b style={{ color: "#182420" }}>{totals.cal}</b></span>
            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
              Base goal
              <input type="number" value={goal}
                onChange={(e) => setGoal(Math.max(parseInt(e.target.value, 10) || 0, 0))}
                style={{ width: 70, padding: "4px 8px", borderRadius: 8, border: "1px solid #C9D5C3", fontWeight: 600, fontFamily: "Inter, sans-serif" }}
                aria-label="Daily calorie goal" />
              kcal
            </span>
          </div>
          {adaptive.daysUsed > 0 && adaptive.adjust !== 0 && (
            <div style={{ textAlign: "center", fontSize: 12, marginTop: 8, color: adaptive.adjust > 0 ? "#2C5E3F" : "#C25E3A" }}>
              {adaptive.adjust > 0
                ? `You ran a deficit recently, so today's budget is +${adaptive.adjust} → ${todayBudget} kcal.`
                : `You ran over recently, so today's budget is ${adaptive.adjust} → ${todayBudget} kcal.`}
            </div>
          )}
          <div style={{ display: "flex", gap: 14, marginTop: 20, flexWrap: "wrap" }}>
            {macroBar("Protein", totals.p, proteinTarget, "#2C5E3F")}
            {macroBar("Carbs", totals.c, Math.round((todayBudget * 0.5) / 4), "#E9A23B")}
            {macroBar("Fat", totals.f, Math.round((todayBudget * 0.25) / 9), "#8FA88A")}
            {macroBar("Fiber", totals.fb, fiberTarget, "#7A5C3E")}
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 18, flexWrap: "wrap" }}>
            {MEALS.map((m) => {
              const budget = Math.round(todayBudget * m.share);
              const used = Math.round(mealTotals[m.id] || 0);
              const left = budget - used;
              return (
                <div key={m.id} style={{ flex: 1, minWidth: 120, background: "#F4F7F0", borderRadius: 10, padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: "#5C6B5E" }}>{m.label}</div>
                  <div style={{ fontSize: 14, fontWeight: 600, marginTop: 2 }}>{used} <span style={{ color: "#8FA88A", fontWeight: 400 }}>/ {budget}</span></div>
                  <div style={{ fontSize: 11, color: left < 0 ? "#C25E3A" : "#5C6B5E" }}>{left < 0 ? `${-left} over` : `${left} left`}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Profile & recommendation */}
        <div style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={S.label}>Your calorie plan</div>
            <button onClick={() => setShowProfile(!showProfile)} style={{ ...S.btn, background: "transparent", color: "#2C5E3F", padding: "4px 0" }}>
              {showProfile ? "Hide" : plan ? "Edit" : "Set up"}
            </button>
          </div>
          {!showProfile && plan && (
            <div style={{ fontSize: 13, color: "#5C6B5E", marginTop: 6 }}>
              Recommended: <b style={{ color: "#182420" }}>{plan.recommended} kcal/day</b> · Protein: <b style={{ color: "#182420" }}>{plan.protein}g</b> <span style={{ color: "#8FA88A" }}>({plan.gPerKg} g/kg for {TARGETS[profile.target].label.split(" ")[0].toLowerCase()})</span> · Fiber: <b style={{ color: "#182420" }}>{fiberTarget}g</b>
            </div>
          )}
          {showProfile && (
            <div style={{ marginTop: 12 }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 150 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 12, fontWeight: 600 }}>Height</span>
                    <button onClick={() => setUnits({ ...units, height: units.height === "cm" ? "ft" : "cm" })} style={{ ...S.btn, padding: 0, background: "transparent", color: "#2C5E3F", fontSize: 11 }}>
                      {units.height === "cm" ? "use ft/in" : "use cm"}
                    </button>
                  </div>
                  {units.height === "cm" ? (
                    <input style={S.input} type="number" placeholder="cm" value={profile.heightCm}
                      onChange={(e) => setProfile({ ...profile, heightCm: e.target.value })} />
                  ) : (
                    <div style={{ display: "flex", gap: 6 }}>
                      <input style={S.input} type="number" placeholder="ft"
                        value={profile.heightCm ? Math.floor(parseFloat(profile.heightCm) / 30.48) : ""}
                        onChange={(e) => {
                          const ft = parseFloat(e.target.value) || 0;
                          const inch = profile.heightCm ? Math.round((parseFloat(profile.heightCm) / 2.54) % 12) : 0;
                          setProfile({ ...profile, heightCm: String(Math.round(ft * 30.48 + inch * 2.54)) });
                        }} />
                      <input style={S.input} type="number" placeholder="in"
                        value={profile.heightCm ? Math.round((parseFloat(profile.heightCm) / 2.54) % 12) : ""}
                        onChange={(e) => {
                          const inch = parseFloat(e.target.value) || 0;
                          const ft = profile.heightCm ? Math.floor(parseFloat(profile.heightCm) / 30.48) : 0;
                          setProfile({ ...profile, heightCm: String(Math.round(ft * 30.48 + inch * 2.54)) });
                        }} />
                    </div>
                  )}
                </div>
                <div style={{ flex: 1, minWidth: 120 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 12, fontWeight: 600 }}>Weight</span>
                    <button onClick={() => setUnits({ ...units, weight: units.weight === "kg" ? "lb" : "kg" })} style={{ ...S.btn, padding: 0, background: "transparent", color: "#2C5E3F", fontSize: 11 }}>
                      {units.weight === "kg" ? "use lb" : "use kg"}
                    </button>
                  </div>
                  <input style={S.input} type="number" placeholder={units.weight}
                    value={profile.weightKg ? (units.weight === "kg" ? profile.weightKg : Math.round(parseFloat(profile.weightKg) * 2.2046)) : ""}
                    onChange={(e) => {
                      const v = parseFloat(e.target.value);
                      setProfile({ ...profile, weightKg: v ? String(units.weight === "kg" ? v : Math.round((v / 2.2046) * 10) / 10) : "" });
                    }} />
                </div>
                <div style={{ flex: 0.7, minWidth: 80 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Age</div>
                  <input style={S.input} type="number" placeholder="years" value={profile.age}
                    onChange={(e) => setProfile({ ...profile, age: e.target.value })} />
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                <div style={{ display: "flex", background: "#E3E9DE", borderRadius: 10, padding: 3 }}>
                  {["male", "female"].map((s) => (
                    <button key={s} onClick={() => setProfile({ ...profile, sex: s })} style={{ ...S.btn, padding: "8px 14px", background: profile.sex === s ? "#2C5E3F" : "transparent", color: profile.sex === s ? "#fff" : "#5C6B5E" }}>
                      {s === "male" ? "Male" : "Female"}
                    </button>
                  ))}
                </div>
                <select value={profile.activity} onChange={(e) => setProfile({ ...profile, activity: e.target.value })} style={{ ...S.input, width: "auto", flex: 1, minWidth: 180 }}>
                  {Object.entries(ACTIVITY).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
                <select value={profile.target} onChange={(e) => setProfile({ ...profile, target: e.target.value })} style={{ ...S.input, width: "auto", flex: 1, minWidth: 160 }}>
                  {Object.entries(TARGETS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
              <label style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 12, fontSize: 13, color: "#182420", cursor: "pointer" }}>
                <input type="checkbox" checked={profile.fasting} onChange={(e) => setProfile({ ...profile, fasting: e.target.checked })} style={{ width: 16, height: 16 }} />
                Show intermittent fasting guidance (early 16:8 window)
              </label>
              {plan ? (
                <div style={{ marginTop: 14, padding: "14px 16px", background: "#F4F7F0", borderRadius: 10 }}>
                  <div style={{ display: "flex", gap: 20, flexWrap: "wrap", fontSize: 13, color: "#5C6B5E" }}>
                    <span>BMR <b style={{ color: "#182420" }}>{plan.bmr}</b></span>
                    <span>Maintenance <b style={{ color: "#182420" }}>{plan.tdee}</b></span>
                    <span>Recommended <b style={{ color: "#2C5E3F", fontSize: 15 }}>{plan.recommended} kcal</b></span>
                    <span>Protein <b style={{ color: "#182420" }}>{plan.protein}g/day</b></span>
                  </div>
                  <button onClick={() => { setGoal(plan.recommended); setShowProfile(false); }} style={{ ...S.btn, background: "#2C5E3F", color: "#fff", marginTop: 12 }}>
                    Set {plan.recommended} kcal as my daily goal
                  </button>
                </div>
              ) : (
                <div style={{ marginTop: 12, fontSize: 13, color: "#5C6B5E" }}>Fill in height, weight, and age to get your recommendation.</div>
              )}
            </div>
          )}
        </div>

        {/* Fasting guidance */}
        {fasting && (
          <div style={{ ...S.card, borderLeft: `4px solid ${fasting.tone === "good" ? "#2C5E3F" : fasting.tone === "warn" ? "#E9A23B" : "#8FA88A"}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={S.label}>{fasting.title}</div>
              <span style={{ fontSize: 12, color: "#8FA88A" }}>{new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}</span>
            </div>
            <div style={{ fontSize: 14, fontWeight: 600, marginTop: 8 }}>{fasting.status}</div>
            <div style={{ fontSize: 13, color: "#5C6B5E", marginTop: 6 }}>{fasting.tip}</div>
          </div>
        )}

        {/* Water tracker */}
        <div style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={S.label}>Water</div>
            <div style={{ fontSize: 13, color: "#5C6B5E" }}><b style={{ color: "#182420" }}>{waterToday}</b> / 8 glasses <span style={{ color: "#8FA88A" }}>· ~{r1(waterToday * 0.25)}L</span></div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
            {Array.from({ length: 8 }).map((_, i) => (
              <button key={i} onClick={() => setWaterToday(i + 1 === waterToday ? i : i + 1)} title={`${i + 1} glasses`}
                style={{ width: 30, height: 38, borderRadius: "4px 4px 8px 8px", border: "2px solid " + (i < waterToday ? "#2C5E3F" : "#C9D5C3"), background: i < waterToday ? "#2C5E3F" : "transparent", cursor: "pointer", transition: "all .15s" }} />
            ))}
            <button onClick={() => setWaterToday(waterToday + 1)} style={{ ...S.btn, background: "#E3E9DE", color: "#182420", padding: "8px 12px", marginLeft: 4 }}>+ glass</button>
          </div>
        </div>

        {/* Weight log */}
        <div style={S.card}>
          <div style={{ ...S.label, marginBottom: 10 }}>Weight log</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <input style={{ ...S.input, flex: 1, minWidth: 120 }} type="number" step="0.1"
              placeholder={`Today's weight (${units.weight})`} value={weightInput}
              onChange={(e) => setWeightInput(e.target.value)} />
            <button onClick={logWeight} style={{ ...S.btn, background: "#2C5E3F", color: "#fff" }}>Log weight</button>
          </div>
          {weights.length > 0 && (() => {
            const toU = (kg) => (units.weight === "kg" ? kg : kg * 2.2046);
            const fmt = (kg) => (units.weight === "kg" ? (Math.round(kg * 10) / 10).toFixed(1) : Math.round(toU(kg)));
            const first = weights[0], last = weights[weights.length - 1];
            const daysBetween = Math.max((new Date(last.date) - new Date(first.date)) / 86400000, 1);
            const change = last.kg - first.kg;
            const weeklyRate = (change / daysBetween) * 7;
            const targetRate = profile.target === "lose" ? -0.5 : profile.target === "gain" ? 0.25 : 0;
            let pace = "";
            if (weights.length >= 2) {
              if (profile.target === "maintain") pace = Math.abs(weeklyRate) < 0.25 ? "Holding steady — right on plan." : `Trending ${weeklyRate > 0 ? "up" : "down"} ${fmt(Math.abs(weeklyRate))} ${units.weight}/week.`;
              else {
                const onTrack = targetRate < 0 ? weeklyRate <= targetRate * 0.5 : weeklyRate >= targetRate * 0.5;
                pace = onTrack
                  ? `${fmt(Math.abs(weeklyRate))} ${units.weight}/week — on pace with your plan.`
                  : `${fmt(Math.abs(weeklyRate))} ${units.weight}/week vs a plan of ${fmt(Math.abs(targetRate))} — give it 2–3 weeks before adjusting calories.`;
              }
            }
            return (
              <div style={{ marginTop: 14 }}>
                <div style={{ display: "flex", gap: 20, flexWrap: "wrap", fontSize: 13, color: "#5C6B5E", marginBottom: 10 }}>
                  <span>Latest <b style={{ color: "#182420" }}>{fmt(last.kg)} {units.weight}</b></span>
                  {weights.length >= 2 && (
                    <span>Change <b style={{ color: change <= 0 ? "#2C5E3F" : "#C25E3A" }}>{change > 0 ? "+" : "−"}{fmt(Math.abs(change))} {units.weight}</b></span>
                  )}
                </div>
                {weights.length >= 2 ? (
                  <React.Fragment>
                    <WeightChart weights={weights} target={profile.target} unit={units.weight} />
                    <div style={{ display: "flex", gap: 16, fontSize: 11, color: "#8FA88A", marginTop: 4 }}>
                      <span><span style={{ display: "inline-block", width: 14, height: 3, background: "#2C5E3F", verticalAlign: "middle", marginRight: 4 }} />Actual</span>
                      {profile.target !== "maintain" && (
                        <span><span style={{ display: "inline-block", width: 14, height: 3, background: "#E9A23B", verticalAlign: "middle", marginRight: 4 }} />Plan</span>
                      )}
                    </div>
                    {pace && <div style={{ fontSize: 13, color: "#182420", marginTop: 8, padding: "10px 12px", background: "#F4F7F0", borderRadius: 10 }}>{pace}</div>}
                  </React.Fragment>
                ) : (
                  <div style={{ fontSize: 13, color: "#5C6B5E" }}>One entry logged — weigh in again tomorrow and the trend chart appears. Same time of day, before breakfast, gives the cleanest data.</div>
                )}
                <details style={{ marginTop: 10 }}>
                  <summary style={{ fontSize: 13, color: "#2C5E3F", fontWeight: 600, cursor: "pointer" }}>History ({weights.length})</summary>
                  {[...weights].reverse().map((w) => (
                    <div key={w.date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #EDF1EA", fontSize: 13 }}>
                      <span style={{ color: "#5C6B5E" }}>{new Date(w.date + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span>
                      <span style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <b>{fmt(w.kg)} {units.weight}</b>
                        <button onClick={() => removeWeight(w.date)} style={{ ...S.btn, background: "transparent", color: "#C25E3A", padding: "2px 6px", fontSize: 14 }}>×</button>
                      </span>
                    </div>
                  ))}
                </details>
              </div>
            );
          })()}
          {weights.length === 0 && (
            <div style={{ fontSize: 13, color: "#5C6B5E", marginTop: 10 }}>No entries yet. Log your weight and it will be charted against your plan's expected trajectory.</div>
          )}
        </div>

        {/* Add food */}
        <div style={S.card}>
          <div style={{ ...S.label, marginBottom: 10 }}>Log a food</div>
          <input style={S.input} placeholder={`Search ${mode} foods — idli, dal, tofu…`} value={query}
            onChange={(e) => { setQuery(e.target.value); setPending(null); }} />
          {results.length > 0 && !pending && (
            <div style={{ marginTop: 8, border: "1px solid #DFE7DA", borderRadius: 10, overflow: "hidden" }}>
              {results.map((f) => (
                <button key={f.name} onClick={() => startAdd(f)} style={{ display: "flex", width: "100%", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", background: "#FBFCF9", border: "none", borderBottom: "1px solid #EDF1EA", cursor: "pointer", fontFamily: "Inter, sans-serif", fontSize: 14, textAlign: "left" }}>
                  <span>{f.name} {f.vegan && <span style={{ fontSize: 10, color: "#2C5E3F", fontWeight: 700, marginLeft: 4 }}>VEGAN</span>}</span>
                  <span style={{ color: "#5C6B5E", fontSize: 13 }}>{f.cal} kcal / {perLabel(f)}</span>
                </button>
              ))}
            </div>
          )}
          {query && results.length === 0 && !pending && (
            <div style={{ marginTop: 8, fontSize: 13, color: "#5C6B5E" }}>Nothing matching — add it as a custom food below.</div>
          )}

          {pending && (
            <div style={{ marginTop: 12, padding: "14px 16px", background: "#F4F7F0", borderRadius: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{pending.food.name}</div>
                <button onClick={() => setPending(null)} style={{ ...S.btn, background: "transparent", color: "#5C6B5E", padding: 0 }}>Cancel</button>
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-end", marginTop: 10, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 4 }}>

          <div style={{ display: "flex", gap: 16, marginTop: 12, flexWrap: "wrap" }}>

            </button>
            <button onClick={() => { setShowCustom(!showCustom); setShowProduct(false); }} style={{ ...S.btn, background: "transparent", color: "#8FA88A", padding: "6px 0" }}>

            </button>
          </div>

            <div style={{ marginTop: 8, padding: "14px 16px", background: "#F4F7F0", borderRadius: 12 }}>
              {savedProducts.length > 0 && (
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: "#5C6B5E", marginBottom: 8 }}>My products — tap to add, then pick a meal</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                    {savedProducts.map((sp) => {
                      const yScore = sp.yuka ? parseInt(sp.yuka, 10) : null;

                        <div key={sp.name} style={{ display: "flex", flexDirection: "column", gap: 6, width: open ? "100%" : "auto" }}>

                              <span title="Yuka score" style={{ width: 22, height: 22, borderRadius: 11, background: yColor, color: "#fff", fontSize: 11, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{yScore}</span>
                            )}
                            <button onClick={() => { setSavedMealFor(open ? null : sp.name); setSavedQty(1); }} style={{ border: "none", background: "transparent", cursor: "pointer", fontFamily: "Inter, sans-serif", fontSize: 13, fontWeight: 600, color: "#182420", padding: 0, flex: 1, textAlign: "left" }}>
                              {sp.name} <span style={{ color: "#5C6B5E", fontWeight: 400 }}>· {Math.round(sp.cal)} kcal · {r1(sp.p)}g P</span>
                            </button>
                            <button onClick={() => startEditProduct(sp)} title="Edit values" style={{ border: "none", background: "transparent", cursor: "pointer", color: "#2C5E3F", fontSize: 13, padding: "0 4px", flexShrink: 0 }}>✎</button>
                            <button onClick={() => removeSaved(sp.name)} title="Forget this product" style={{ border: "none", background: "transparent", cursor: "pointer", color: "#C25E3A", fontSize: 14, padding: "0 4px", flexShrink: 0 }}>×</button>
                          </div>
                          {editingProduct === sp.name && (
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "flex-end", padding: "6px 4px", width: "100%" }}>
                              <div><div style={{ fontSize: 10, color: "#5C6B5E", fontWeight: 600 }}>kcal</div><input style={{ ...S.input, width: 70, padding: "8px 10px" }} type="number" value={editVals.cal} onChange={(e) => setEditVals({ ...editVals, cal: e.target.value })} /></div>
                              <div><div style={{ fontSize: 10, color: "#5C6B5E", fontWeight: 600 }}>protein</div><input style={{ ...S.input, width: 60, padding: "8px 10px" }} type="number" value={editVals.p} onChange={(e) => setEditVals({ ...editVals, p: e.target.value })} /></div>
                              <div><div style={{ fontSize: 10, color: "#5C6B5E", fontWeight: 600 }}>fiber</div><input style={{ ...S.input, width: 60, padding: "8px 10px" }} type="number" value={editVals.fb} onChange={(e) => setEditVals({ ...editVals, fb: e.target.value })} /></div>
                              <div><div style={{ fontSize: 10, color: "#5C6B5E", fontWeight: 600 }}>Yuka</div><input style={{ ...S.input, width: 60, padding: "8px 10px" }} type="number" value={editVals.yuka} onChange={(e) => setEditVals({ ...editVals, yuka: e.target.value })} /></div>
                              <button onClick={() => saveEditProduct(sp.name)} style={{ ...S.btn, background: "#2C5E3F", color: "#fff", padding: "8px 12px" }}>Save</button>
                              <button onClick={() => setEditingProduct(null)} style={{ ...S.btn, background: "transparent", color: "#8FA88A", padding: "8px 6px" }}>Cancel</button>
                            </div>
                          )}
                          {open && (
                            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", padding: "2px 4px 6px" }}>
                              <span style={{ fontSize: 12, color: "#5C6B5E", fontWeight: 600 }}>Servings:</span>
                              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                                <button onClick={() => setSavedQty((q) => Math.max(r1(q - 0.5), 0.5))} style={{ ...S.btn, background: "#E3E9DE", padding: "4px 10px" }}>−</button>
                                <span style={{ minWidth: 28, textAlign: "center", fontWeight: 700, fontSize: 14 }}>{savedQty}</span>
                                <button onClick={() => setSavedQty((q) => r1(q + 0.5))} style={{ ...S.btn, background: "#E3E9DE", padding: "4px 10px" }}>+</button>
                              </div>
                              <span style={{ fontSize: 12, color: "#5C6B5E", fontWeight: 600, marginLeft: 4 }}>→ add to:</span>
                              {MEALS.map((mm) => (
                                <button key={mm.id} onClick={() => quickAddSaved(sp, mm.id, savedQty)} style={S.chip(false)}>{mm.label}</button>
                              ))}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ height: 1, background: "#DFE7DA", margin: "14px 0 4px" }} />
                  <div style={{ fontSize: 12, color: "#8FA88A", marginBottom: 8 }}>Or enter a new product below — it'll be saved here after.</div>
                </div>
              )}
              <div style={{ fontSize: 13, color: "#5C6B5E", marginBottom: 10 }}>Copy the numbers straight off the nutrition label (per serving), then set how many servings you had.</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <input style={{ ...S.input, flex: 2, minWidth: 160 }} placeholder="Product name (e.g. protein bar)" value={product.name} onChange={(e) => setProduct({ ...product, name: e.target.value })} />

                  <input style={S.input} type="number" placeholder="150" value={product.cal} onChange={(e) => setProduct({ ...product, cal: e.target.value })} />
                </div>
                <div style={{ flex: 1, minWidth: 80 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 3, color: "#5C6B5E" }}>protein g</div>
                  <input style={S.input} type="number" placeholder="15" value={product.p} onChange={(e) => setProduct({ ...product, p: e.target.value })} />
                </div>
                <div style={{ flex: 1, minWidth: 80 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 3, color: "#5C6B5E" }}>fiber g</div>
                  <input style={S.input} type="number" placeholder="opt." value={product.fb} onChange={(e) => setProduct({ ...product, fb: e.target.value })} />

                <div style={{ flex: 1, minWidth: 90 }}>
                  <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 3, color: "#5C6B5E" }}>servings</div>
                  <input style={S.input} type="number" step="0.5" value={product.qty} onChange={(e) => setProduct({ ...product, qty: Math.max(parseFloat(e.target.value) || 0, 0) })} />
                </div>
              </div>
              {product.cal && product.p && (() => {
                const cal = parseFloat(product.cal) || 0, p = parseFloat(product.p) || 0;
                const density = p > 0 ? cal / p : 0; // kcal per gram of protein — lower is leaner
                const verdict = density <= 8 ? { t: "Excellent protein-to-calorie ratio — a lean protein source.", c: "#2C5E3F" }
                  : density <= 14 ? { t: "Solid protein ratio for a packaged product.", c: "#2C5E3F" }
                  : density <= 22 ? { t: "Moderate — fine as a snack, but not a lean protein pick.", c: "#E9A23B" }
                  : { t: "This is more of a treat than a protein source — most calories aren't from protein.", c: "#C25E3A" };
                const totCal = Math.round(cal * (product.qty || 0));
                const gToGo = proteinGap;
                return (
                  <div style={{ marginTop: 10, fontSize: 13 }}>
                    <div style={{ color: "#5C6B5E" }}>
                      = <b style={{ color: "#182420" }}>{totCal} kcal</b> · {r1(p * (product.qty || 0))}g protein · <b>{r1(density)}</b> kcal per g protein
                    </div>
                    <div style={{ color: verdict.c, fontWeight: 600, marginTop: 4 }}>{verdict.t}</div>
                    {gToGo > 0 && p > 0 && (
                      <div style={{ color: "#5C6B5E", marginTop: 4 }}>Covers {Math.min(Math.round((p * (product.qty || 0) / gToGo) * 100), 100)}% of your remaining {gToGo}g protein for today.</div>
                    )}
                  </div>
                );
              })()}
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap", alignItems: "center" }}>
                {MEALS.map((m) => (
                  <button key={m.id} onClick={() => setProduct({ ...product, meal: m.id })} style={S.chip((product.meal || defaultMealNow()) === m.id)}>{m.label}</button>
                ))}
                <button onClick={addProduct} style={{ ...S.btn, background: "#2C5E3F", color: "#fff", marginLeft: "auto" }}>Add product</button>
              </div>
            </div>
          )}

          {showCustom && (
            <div style={{ display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" }}>
              <input style={{ ...S.input, flex: 2, minWidth: 140 }} placeholder="Food name" value={custom.name} onChange={(e) => setCustom({ ...custom, name: e.target.value })} />
              <input style={{ ...S.input, flex: 1, minWidth: 70 }} type="number" placeholder="kcal" value={custom.cal} onChange={(e) => setCustom({ ...custom, cal: e.target.value })} />
              <input style={{ ...S.input, flex: 1, minWidth: 70 }} type="number" placeholder="protein g" value={custom.p} onChange={(e) => setCustom({ ...custom, p: e.target.value })} />
              <input style={{ ...S.input, flex: 1, minWidth: 70 }} type="number" placeholder="fiber g" value={custom.fb} onChange={(e) => setCustom({ ...custom, fb: e.target.value })} />
              <button onClick={addCustom} style={{ ...S.btn, background: "#2C5E3F", color: "#fff" }}>Add</button>
            </div>
          )}
        </div>

        {/* Import from another app (Cronometer etc.) */}
        <div style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={S.label}>Import from another app</div>
            <button onClick={() => { setShowImport(!showImport); setImportMsg(null); }} style={{ ...S.btn, background: "transparent", color: "#2C5E3F", padding: "4px 0" }}>
              {showImport ? "Hide" : "Open"}
            </button>
          </div>
          {showImport && (
            <div style={{ marginTop: 12 }}>
              {/* Quick day totals — mobile friendly */}
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>Quick day totals <span style={{ color: "#8FA88A", fontWeight: 400 }}>· easiest on phone</span></div>
              <div style={{ fontSize: 12, color: "#5C6B5E", marginBottom: 8 }}>Read the day's totals off Cronometer (or any app) and type them here — any order, loose format works.</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <input style={{ ...S.input, flex: 1, minWidth: 180 }} placeholder="e.g. 1850 cal, 95 protein, 24 fiber" value={dayText}
                  onChange={(e) => setDayText(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter") importDayTotals(); }} />
                <button onClick={importDayTotals} style={{ ...S.btn, background: "#2C5E3F", color: "#fff" }}>Log day</button>
              </div>

              {/* CSV import — laptop friendly */}
              <div style={{ height: 1, background: "#EDF1EA", margin: "16px 0" }} />
              <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>CSV file import <span style={{ color: "#8FA88A", fontWeight: 400 }}>· detailed, best on computer</span></div>
              <div style={{ fontSize: 12, color: "#5C6B5E", marginBottom: 8 }}>In Cronometer: Settings → Account → Export Data → a "Servings" or "Daily Nutrition" CSV. Upload it here to load every item, grouped by day.</div>
              <input ref={fileInputRef} type="file" accept=".csv,text/csv" style={{ display: "none" }}
                onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) handleCSV(f); e.target.value = ""; }} />
              <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{ ...S.btn, background: "#E3E9DE", color: "#182420" }}>Choose CSV file…</button>

              {importMsg && (
                <div style={{ marginTop: 12, padding: "10px 12px", borderRadius: 10, fontSize: 13, background: importMsg.ok ? "#F4F7F0" : "#FBE9E2", color: importMsg.ok ? "#2C5E3F" : "#C25E3A" }}>
                  {importMsg.text}
                </div>
              )}
            </div>
          )}
        </div>

        {/* Suggestions */}
        <div style={S.card}>
          <div style={{ ...S.label, marginBottom: 6 }}>What to eat next</div>
          <div style={{ fontSize: 13, color: "#5C6B5E", marginBottom: 12 }}>{note}</div>
          {suggestions.length > 0 && (
            <div style={{ display: "grid", gap: 8 }}>
              {suggestions.map((f) => (
                <div key={f.name} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", background: "#F4F7F0", borderRadius: 10, gap: 10, flexWrap: "wrap" }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{f.name}</div>
                    <div style={{ fontSize: 12, color: "#5C6B5E" }}>{f.reason}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 13, color: "#5C6B5E" }}>{f.cal} kcal / {perLabel(f)}</span>
                    <button onClick={() => startAdd(f)} style={{ ...S.btn, background: "#E9A23B", color: "#182420", padding: "8px 14px" }}>Eat this</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Today's log, grouped by meal */}
        <div style={S.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
            <div style={S.label}>Today's log</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {(allLogs[yesterdayKey()] || []).length > 0 && (
                <button onClick={() => copyDayIntoToday(yesterdayKey())} style={{ ...S.btn, background: "#E3E9DE", color: "#182420", padding: "6px 12px", fontSize: 13 }}>⧉ Copy yesterday</button>
              )}
              <button onClick={() => setShowTemplates(!showTemplates)} style={{ ...S.btn, background: "transparent", color: "#2C5E3F", padding: "6px 8px", fontSize: 13 }}>
                {showTemplates ? "Hide templates" : `Templates${templates.length ? ` (${templates.length})` : ""}`}
              </button>
            </div>
          </div>

          {showTemplates && (
            <div style={{ background: "#F4F7F0", borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>
              {templates.length > 0 ? (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                  {templates.map((t) => {
                    const tCal = t.items.reduce((s, i) => s + i.cal, 0);

                      <div key={t.name} style={{ display: "flex", alignItems: "center", background: "#fff", border: "1px solid #DFE7DA", borderRadius: 20, padding: "5px 6px 5px 12px", gap: 8 }}>
                        <button onClick={() => applyTemplate(t)} style={{ border: "none", background: "transparent", cursor: "pointer", fontFamily: "Inter, sans-serif", fontSize: 13, fontWeight: 600, color: "#182420", padding: 0 }}>
                          {t.name} <span style={{ color: "#5C6B5E", fontWeight: 400 }}>· {t.items.length} items · {tCal} kcal</span>
                        </button>
                        <button onClick={() => removeTemplate(t.name)} title="Delete template" style={{ border: "none", background: "transparent", cursor: "pointer", color: "#C25E3A", fontSize: 14, padding: "0 4px" }}>×</button>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{ fontSize: 13, color: "#5C6B5E", marginBottom: 12 }}>No templates yet. Log a set of foods, then save them below as a reusable combo (e.g. "My usual breakfast").</div>
              )}
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                <input style={{ ...S.input, flex: 1, minWidth: 160 }} placeholder="Name this combo (saves today's log)" value={tmplName} onChange={(e) => setTmplName(e.target.value)} />
                <button onClick={saveTemplate} disabled={!tmplName.trim() || log.length === 0} style={{ ...S.btn, background: log.length === 0 || !tmplName.trim() ? "#C9D5C3" : "#2C5E3F", color: "#fff" }}>Save current log</button>
              </div>
            </div>
          )}

          {log.length === 0 && (
            <div style={{ fontSize: 14, color: "#5C6B5E" }}>Nothing logged yet. Search above or tap a suggestion to start the day.</div>

          {MEALS.map((m) => {
            const items = log.filter((x) => x.meal === m.id);
            if (items.length === 0) return null;
            const budget = Math.round(goal * m.share);
            const used = Math.round(mealTotals[m.id] || 0);
            return (
              <div key={m.id} style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", paddingBottom: 6, borderBottom: "2px solid #2C5E3F" }}>
                  <span style={{ fontFamily: "'Bricolage Grotesque', sans-serif", fontWeight: 700, fontSize: 16 }}>{m.label}</span>
                  <span style={{ fontSize: 12, color: used > budget ? "#C25E3A" : "#5C6B5E" }}>{used} / {budget} kcal</span>
                </div>
                {items.map((x) => (
                  <div key={x.id} style={{ padding: "10px 0", borderBottom: "1px solid #EDF1EA" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
